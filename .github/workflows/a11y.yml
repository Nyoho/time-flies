name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-be-a11y:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - run: npm ci
      - run: npm run a11y:static

      - name: Upload be-a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-a11y-report
          path: reports/be-a11y-report.json
          if-no-files-found: ignore

  axe-playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y
